<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Workbook Manager'">Workbook Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="app-header">
    <div class="header-inner">
        <a th:href="@{/workbooks}" class="logo">
            <span>Workbook Manager</span>
        </a>
        <nav>
            <a th:href="@{/workbooks}" class="nav-link">Workbooks</a>
            <a th:href="@{/workbooks/new}" class="btn btn-sm btn-primary"> New</a>
        </nav>
    </div>
</header>

<main class="main-content">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
</main>

</body>
</html>
