<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}"> Workbook Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="guce-header" th:fragment="topbar">
    <div class="guce-institution-bar">
        <div class="guce-header-inner">
            <span>Workbook Manager</span>
        </div>
    </div>

    <div class="guce-header-main">
        <div class="guce-header-inner">
            <a th:href="@{/workbooks}" class="guce-brand" aria-label="Accueil GUCE Workbook Manager">
                <span class="guce-brand-mark">G</span>
                <span class="guce-brand-text">
                    <strong>Workbook Manager</strong>
                    <small>Workbook Manager</small>
                </span>
            </a>
            <div class="guce-user">
            </div>
        </div>
    </div>
</header>

<aside class="guce-sidebar" th:fragment="sidebar(active)" aria-label="Menu GUCE">
    <div class="guce-sidebar-section">
        <a th:href="@{/workbooks}"
           class="guce-sidebar-link"
           th:classappend="${active == 'workbooks'} ? 'is-active'">
            <span class="guce-sidebar-icon"></span>
            <span>Workbooks</span>
        </a>
    </div>


</aside>

<footer class="guce-footer" th:fragment="footer">
    <span> Workbook Manager</span>
</footer>

</body>
</html>
