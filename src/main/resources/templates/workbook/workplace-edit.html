<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{workbook/layout :: head('Workbook Manager - Workplace')}"></head>
<body>

<div class="guce-shell">
    <header th:replace="~{workbook/layout :: topbar}"></header>

    <div class="guce-body">
        <aside th:replace="~{workbook/layout :: sidebar('workbooks')}"></aside>

        <main class="guce-main">
            <section class="guce-content-bar">
                <div>
                    <p class="eyebrow">Workplace</p>
                    <h1>Update workplace</h1>
                    <p class="page-subtitle" th:text="'For: ' + ${workbook.fullName}">For: Workbook</p>
                </div>
                <a th:href="@{/workbooks/{id}(id=${workbook.id})}" class="btn btn-outline">Back to workbook</a>
            </section>

            <div class="main-content">
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

                <div class="card form-card">
                    <form th:action="@{/workbooks/{id}/workplaces/{wpId}/edit(id=${workbook.id},wpId=${workplace.id})}"
                          th:object="${workplace}"
                          method="post">

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="companyCode">Company code <span class="required">*</span></label>
                                <input type="text" id="companyCode" th:field="*{companyCode}"
                                       class="form-control" th:classappend="${#fields.hasErrors('companyCode')} ? 'is-invalid'"
                                       placeholder="Ex: ACME">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('companyCode')}" th:errors="*{companyCode}"></div>
                            </div>

                            <div class="form-group">
                                <label for="companyName">Company name <span class="required">*</span></label>
                                <input type="text" id="companyName" th:field="*{companyName}"
                                       class="form-control" th:classappend="${#fields.hasErrors('companyName')} ? 'is-invalid'"
                                       placeholder="Nom complet">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></div>
                            </div>

                            <div class="form-group">
                                <label for="countryCode">Country code <span class="required">*</span></label>
                                <input type="text" id="countryCode" th:field="*{countryCode}"
                                       class="form-control" th:classappend="${#fields.hasErrors('countryCode')} ? 'is-invalid'"
                                       placeholder="Ex: FR">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('countryCode')}" th:errors="*{countryCode}"></div>
                            </div>

                            <div class="form-group">
                                <label for="countryName">Country name <span class="required">*</span></label>
                                <input type="text" id="countryName" th:field="*{countryName}"
                                       class="form-control" th:classappend="${#fields.hasErrors('countryName')} ? 'is-invalid'"
                                       placeholder="Ex: France">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('countryName')}" th:errors="*{countryName}"></div>
                            </div>

                            <div class="form-group">
                                <label for="startDate">Start date <span class="required">*</span></label>
                                <input type="date" id="startDate" th:field="*{startDate}"
                                       class="form-control" th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
                            </div>

                            <div class="form-group">
                                <label for="endDate">End date</label>
                                <input type="date" id="endDate" th:field="*{endDate}" class="form-control">
                                <small class="form-hint">Leave empty when this workplace is current.</small>
                            </div>

                            <div class="form-group form-group-full">
                                <label class="checkbox-label">
                                    <input type="checkbox" th:field="*{current}">
                                    <span>Workplace current</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-actions">
                            <a th:href="@{/workbooks/{id}(id=${workbook.id})}" class="btn btn-outline">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <footer th:replace="~{workbook/layout :: footer}"></footer>
</div>

</body>
</html>
