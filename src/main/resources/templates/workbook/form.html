<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{workbook/layout :: head(${pageTitle + ' — Workbook Manager'})}"></head>
<body>

<div class="guce-shell">
    <header th:replace="~{workbook/layout :: topbar}"></header>

    <div class="guce-body">
        <aside th:replace="~{workbook/layout :: sidebar(${workbook.id != null ? 'workbooks' : 'new'})}"></aside>

        <main class="guce-main">

            <section class="guce-content-bar">

                <a th:href="${workbook.id != null ? '/workbooks/' + workbook.id : '/workbooks'}"
                   class="btn btn-outline">← Retour</a>
            </section>

            <div class="main-content">

                <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

                <!-- TABS NAV -->
                <div class="form-tabs" role="tablist">
                    <button type="button" class="form-tab is-active"
                            role="tab" aria-selected="true" aria-controls="tab-workbook"
                            data-tab="tab-workbook">
                        <span class="tab-num">01</span>
                        <span>Workbook</span>
                    </button>
                    <button type="button" class="form-tab"
                            role="tab" aria-selected="false" aria-controls="tab-workplaces"
                            data-tab="tab-workplaces">
                        <span class="tab-num">02</span>
                        <span>Workplaces</span>
                        <span class="tab-badge" id="wp-tab-badge">0</span>
                    </button>
                </div>

                <!-- ═══════════════════════════════════════════════
                     ONGLET 1 — WORKBOOK
                ════════════════════════════════════════════════ -->
                <div id="tab-workbook" class="tab-panel is-active" role="tabpanel">
                    <div class="card form-card">
                        <!--
                            ACTION UNIQUE : workbook + workplaces soumis ensemble.
                            Les hidden inputs workplaces[i].xxx sont injectés par JS avant envoi.
                        -->
                        <form id="workbook-form"
                              th:action="${workbook.id != null ? '/workbooks/' + workbook.id + '/edit' : '/workbooks'}"
                              th:object="${workbook}"
                              method="post">

                            <div class="form-grid">

                                <div class="form-group">
                                    <label for="firstName">Prénom <span class="required">*</span></label>
                                    <input type="text" id="firstName" th:field="*{firstName}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                           placeholder="Prénom">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('firstName')}"
                                         th:errors="*{firstName}"></div>
                                </div>

                                <div class="form-group">
                                    <label for="lastName">Nom <span class="required">*</span></label>
                                    <input type="text" id="lastName" th:field="*{lastName}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                           placeholder="Nom de famille">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('lastName')}"
                                         th:errors="*{lastName}"></div>
                                </div>

                                <div class="form-group">
                                    <label for="birthdate">Date de naissance <span class="required">*</span></label>
                                    <input type="date" id="birthdate" th:field="*{birthdate}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('birthdate')} ? 'is-invalid'">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('birthdate')}"
                                         th:errors="*{birthdate}"></div>
                                </div>

                                <div class="form-group">
                                    <label for="passportNumber">N° passeport <span class="required">*</span></label>
                                    <input type="text" id="passportNumber" th:field="*{passportNumber}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('passportNumber')} ? 'is-invalid'"
                                           placeholder="Ex : AB123456">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('passportNumber')}"
                                         th:errors="*{passportNumber}"></div>
                                </div>

                                <div class="form-group form-group-full">
                                    <label for="email">Email <span class="required">*</span></label>
                                    <input type="email" id="email" th:field="*{email}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                           placeholder="email@exemple.com">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}"></div>
                                </div>

                            </div><!-- /form-grid -->

                            <!-- Conteneur des hidden inputs workplaces — rempli par JS avant submit -->
                            <div id="wp-hidden-container" aria-hidden="true"></div>

                            <div class="form-actions">
                                <a th:href="${workbook.id != null ? '/workbooks/' + workbook.id : '/workbooks'}"
                                   class="btn btn-outline">Annuler</a>
                                <button type="submit" id="btn-submit" class="btn btn-primary"
                                        th:text="${workbook.id != null ? 'Enregistrer' : 'Créer'}">Créer</button>
                            </div>

                        </form>
                    </div>
                </div><!-- /tab-workbook -->

                <!-- ═══════════════════════════════════════════════
                     ONGLET 2 — WORKPLACES
                ════════════════════════════════════════════════ -->
                <div id="tab-workplaces" class="tab-panel" role="tabpanel">

                    <div class="section-header">
                        <h2>Workplaces saisis</h2>
                        <button type="button" class="btn btn-primary" id="btn-open-add-modal">
                            + Ajouter
                        </button>
                    </div>

                    <!-- Tableau dynamique — rendu par JS -->
                    <div class="card table-card" id="wp-table-wrapper">

                        <!-- État vide (affiché / masqué par JS) -->
                        <div class="empty-state" id="wp-empty-state">
                            <div class="empty-icon">WP</div>
                            <h3>Aucun workplace</h3>
                            <p>Cliquez sur « + Ajouter » pour saisir un premier poste.</p>
                        </div>

                        <!-- Tableau (affiché / masqué par JS) -->
                        <div class="table-responsive" id="wp-table-container" style="display:none">
                            <table class="table" id="wp-table">
                                <thead>
                                <tr>
                                    <th>Rang</th>
                                    <th>Code entreprise</th>
                                    <th>Nom Entreprise</th>
                                    <th>Code pays</th>
                                    <th>Nom Pays</th>
                                    <th>Date Début</th>
                                    <th>Date Fin</th>
                                    <th class="actions-col">Actions</th>
                                </tr>
                                </thead>
                                <tbody id="wp-tbody">
                                <!-- Lignes injectées par JS -->
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div><!-- /tab-workplaces -->

            </div><!-- /main-content -->
        </main>
    </div>

    <footer th:replace="~{workbook/layout :: footer}"></footer>
</div>

<!-- ═══════════════════════════════════════════════════════════
     MODALE WORKPLACE (ajout + édition)
══════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="wp-modal" role="dialog" aria-modal="true"
     aria-labelledby="modal-title" hidden>
    <div class="modal-box">

        <div class="modal-header">
            <h2 class="modal-title" id="modal-title">Ajouter un workplace</h2>
            <button type="button" class="modal-close" id="modal-close-btn" aria-label="Fermer">✕</button>
        </div>

        <div class="modal-body">
            <div class="form-grid">

                <div class="form-group">
                    <label for="m-companyCode">Code entreprise <span class="required">*</span></label>
                    <input type="text" id="m-companyCode" class="form-control"
                           placeholder="Ex : CI001" autocomplete="off">
                    <div class="invalid-feedback" id="err-companyCode"></div>
                </div>

                <div class="form-group">
                    <label for="m-companyName">Nom de l'entreprise <span class="required">*</span></label>
                    <input type="text" id="m-companyName" class="form-control"
                           placeholder="Ex : Société Générale CI" autocomplete="off">
                    <div class="invalid-feedback" id="err-companyName"></div>
                </div>

                <div class="form-group">
                    <label for="m-countryCode">Code pays <span class="required">*</span></label>
                    <input type="text" id="m-countryCode" class="form-control"
                           placeholder="Ex : CI" maxlength="3" autocomplete="off"
                           style="text-transform:uppercase">
                    <div class="invalid-feedback" id="err-countryCode"></div>
                </div>

                <div class="form-group">
                    <label for="m-countryName">Nom du pays <span class="required">*</span></label>
                    <input type="text" id="m-countryName" class="form-control"
                           placeholder="Ex : Côte d'Ivoire" autocomplete="off">
                    <div class="invalid-feedback" id="err-countryName"></div>
                </div>

                <div class="form-group">
                    <label for="m-startDate">Date de début <span class="required">*</span></label>
                    <input type="date" id="m-startDate" class="form-control">
                    <div class="invalid-feedback" id="err-startDate"></div>
                </div>

                <div class="form-group">
                    <label for="m-endDate">Date de fin</label>
                    <input type="date" id="m-endDate" class="form-control">
                    <div class="form-hint">Laisser vide si poste en cours</div>
                </div>

                <div class="form-group form-group-full">
                    <label class="checkbox-label">
                        <input type="checkbox" id="m-current">
                        Poste actuel
                    </label>
                    <div class="form-hint">Un seul poste peut être marqué comme actuel.</div>
                </div>

            </div><!-- /form-grid -->
        </div><!-- /modal-body -->

        <div class="modal-footer">
            <button type="button" class="btn btn-outline" id="modal-cancel-btn">Annuler</button>
            <button type="button" class="btn btn-primary" id="modal-confirm-btn">Ajouter</button>
        </div>

    </div>
</div>

<!-- Workplaces JSON injected by Thymeleaf -->
<div id="wp-data" th:attr="data-json=${workplacesJson}" style="display:none"></div>

<script>
    (function () {
        'use strict';

        var SESSION_KEY = 'wm_workplaces_session';

        var stored = sessionStorage.getItem(SESSION_KEY);
        var workplaces = [];
        try {
            workplaces = stored
                ? JSON.parse(stored)
                : JSON.parse(document.getElementById('wp-data').getAttribute('data-json') || '[]');
        } catch (e) { workplaces = []; }

        var editingIndex = -1;

        var modal          = document.getElementById('wp-modal');
        var modalTitle     = document.getElementById('modal-title');
        var confirmBtn     = document.getElementById('modal-confirm-btn');
        var cancelBtn      = document.getElementById('modal-cancel-btn');
        var closeBtn       = document.getElementById('modal-close-btn');
        var addBtn         = document.getElementById('btn-open-add-modal');
        var tbody          = document.getElementById('wp-tbody');
        var emptyState     = document.getElementById('wp-empty-state');
        var tableContainer = document.getElementById('wp-table-container');
        var tabBadge       = document.getElementById('wp-tab-badge');
        var hiddenContainer= document.getElementById('wp-hidden-container');
        var form           = document.getElementById('workbook-form');

        var fCode    = document.getElementById('m-companyCode');
        var fName    = document.getElementById('m-companyName');
        var fCCode   = document.getElementById('m-countryCode');
        var fCName   = document.getElementById('m-countryName');
        var fStart   = document.getElementById('m-startDate');
        var fEnd     = document.getElementById('m-endDate');
        var fCurrent = document.getElementById('m-current');

        var errCode  = document.getElementById('err-companyCode');
        var errName  = document.getElementById('err-companyName');
        var errCCode = document.getElementById('err-countryCode');
        var errCName = document.getElementById('err-countryName');
        var errStart = document.getElementById('err-startDate');

        function switchTab(tabId) {
            document.querySelectorAll('.form-tab').forEach(function (t) {
                var active = t.dataset.tab === tabId;
                t.classList.toggle('is-active', active);
                t.setAttribute('aria-selected', active ? 'true' : 'false');
            });
            document.querySelectorAll('.tab-panel').forEach(function (p) {
                p.classList.toggle('is-active', p.id === tabId);
            });
        }

        document.querySelectorAll('.form-tab').forEach(function (tab) {
            tab.addEventListener('click', function () { switchTab(tab.dataset.tab); });
        });

        function renderTable() {
            tbody.innerHTML = '';
            if (workplaces.length === 0) {
                emptyState.style.display     = '';
                tableContainer.style.display = 'none';
            } else {
                emptyState.style.display     = 'none';
                tableContainer.style.display = '';
                workplaces.forEach(function (wp, idx) {
                    var tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td class="mono muted">' + wp.rank + '</td>' +
                        '<td>' + (wp.current
                            ? '<span class="badge badge-current">En poste</span>'
                            : '<span class="badge">Passe</span>') + '</td>' +
                        '<td class="mono">' + esc(wp.companyCode) + '</td>' +
                        '<td>' + esc(wp.companyName) + '</td>' +
                        '<td class="mono">' + esc(wp.countryCode) + '</td>' +
                        '<td>' + esc(wp.countryName) + '</td>' +
                        '<td class="mono">' + esc(wp.startDate) + '</td>' +
                        '<td class="mono">' + (wp.endDate ? esc(wp.endDate) : '<span class="muted">-</span>') + '</td>' +
                        '<td class="actions">' +
                        '<button type="button" class="btn btn-sm btn-icon btn-edit" data-idx="' + idx + '" title="Modifier">' +
                        '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15">' +
                        '<path d="M13.586 3.586a2 2 0 1 1 2.828 2.828L7.5 15.328l-3.75.75.75-3.75 9.086-8.742z"/>' +
                        '</svg>' +
                        '</button>' +
                        '<button type="button" class="btn btn-sm btn-icon btn-delete btn-danger" data-idx="' + idx + '" title="Supprimer">' +
                        '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15">' +
                        '<path d="M6 6l8 8M14 6l-8 8"/>' +
                        '</svg>' +
                        '</button>' +
                        '</td>';
                    tbody.appendChild(tr);
                });
            }
            tabBadge.textContent   = workplaces.length;
            tabBadge.style.display = workplaces.length > 0 ? '' : 'none';
            sessionStorage.setItem(SESSION_KEY, JSON.stringify(workplaces));
        }

        function reassignRanks() {
            workplaces.forEach(function (wp, i) { wp.rank = i + 1; });
        }

        function esc(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function openModal(idx) {
            editingIndex = (idx === undefined) ? -1 : idx;
            clearErrors();
            if (editingIndex === -1) {
                modalTitle.textContent = 'Ajouter un workplace';
                confirmBtn.textContent = 'Ajouter';
                fCode.value = ''; fName.value = ''; fCCode.value = '';
                fCName.value = ''; fStart.value = ''; fEnd.value = '';
                fCurrent.checked = false;
            } else {
                var wp = workplaces[editingIndex];
                modalTitle.textContent = 'Modifier le workplace';
                confirmBtn.textContent = 'Enregistrer';
                fCode.value    = wp.companyCode;
                fName.value    = wp.companyName;
                fCCode.value   = wp.countryCode;
                fCName.value   = wp.countryName;
                fStart.value   = wp.startDate;
                fEnd.value     = wp.endDate || '';
                fCurrent.checked = wp.current;
            }
            modal.hidden = false;
            document.body.classList.add('modal-open');
            fCode.focus();
        }

        function closeModal() {
            modal.hidden = true;
            document.body.classList.remove('modal-open');
            editingIndex = -1;
        }

        function validate() {
            clearErrors();
            var ok = true;
            function req(input, errEl, msg) {
                if (!input.value.trim()) {
                    errEl.textContent = msg;
                    input.classList.add('is-invalid');
                    ok = false;
                }
            }
            req(fCode,  errCode,  'Le code entreprise est obligatoire.');
            req(fName,  errName,  "Le nom de l entreprise est obligatoire.");
            req(fCCode, errCCode, 'Le code pays est obligatoire.');
            req(fCName, errCName, 'Le nom du pays est obligatoire.');
            req(fStart, errStart, 'La date de debut est obligatoire.');
            return ok;
        }

        function clearErrors() {
            [fCode, fName, fCCode, fCName, fStart].forEach(function (f) {
                f.classList.remove('is-invalid');
            });
            [errCode, errName, errCCode, errCName, errStart].forEach(function (e) {
                e.textContent = '';
            });
        }

        confirmBtn.addEventListener('click', function () {
            if (!validate()) return;
            if (fCurrent.checked) {
                workplaces.forEach(function (wp, i) {
                    if (i !== editingIndex) wp.current = false;
                });
            }
            var wp = {
                companyCode : fCode.value.trim(),
                companyName : fName.value.trim(),
                countryCode : fCCode.value.trim().toUpperCase(),
                countryName : fCName.value.trim(),
                startDate   : fStart.value,
                endDate     : fEnd.value || null,
                current     : fCurrent.checked,
                rank        : 0
            };
            if (editingIndex === -1) {
                wp.rank = workplaces.length + 1;
                workplaces.push(wp);
            } else {
                wp.rank = workplaces[editingIndex].rank;
                workplaces[editingIndex] = wp;
            }
            closeModal();
            renderTable();
            switchTab('tab-workplaces');
        });

        tbody.addEventListener('click', function (e) {
            var editBtn   = e.target.closest('.btn-edit');
            var deleteBtn = e.target.closest('.btn-delete');
            if (editBtn) {
                openModal(parseInt(editBtn.dataset.idx, 10));
                return;
            }
            if (deleteBtn) {
                if (!confirm('Voulez-vous vraiment supprimer ce workplace ?')) return;
                workplaces.splice(parseInt(deleteBtn.dataset.idx, 10), 1);
                reassignRanks();
                renderTable();
            }
        });

        addBtn.addEventListener('click', function () { openModal(); });
        cancelBtn.addEventListener('click', closeModal);
        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && !modal.hidden) closeModal();
        });

        form.addEventListener('submit', function () {
            hiddenContainer.innerHTML = '';
            workplaces.forEach(function (wp, i) {
                function h(name, val) {
                    var inp   = document.createElement('input');
                    inp.type  = 'hidden';
                    inp.name  = 'workplaces[' + i + '].' + name;
                    inp.value = val != null ? val : '';
                    hiddenContainer.appendChild(inp);
                }
                h('companyCode', wp.companyCode);
                h('companyName', wp.companyName);
                h('countryCode', wp.countryCode);
                h('countryName', wp.countryName);
                h('startDate',   wp.startDate);
                h('endDate',     wp.endDate || '');
                h('current',     wp.current ? 'true' : 'false');
                h('rank',        wp.rank);
            });
            sessionStorage.removeItem(SESSION_KEY);
        });

        renderTable();

    })();
</script>

</body>
</html>
